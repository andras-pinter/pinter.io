<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="András Pintér - Principal Software Engineer & Architect. Building secure, high-performance distributed systems."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:title" content="András Pintér | Principal Software Engineer & Architect" />
		<meta
			property="og:description"
			content="Building secure, high-performance distributed systems in Rust and C#."
		/>
		<meta property="og:url" content="https://pinter.io" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:site_name" content="András Pintér" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="András Pintér | Principal Software Engineer & Architect" />
		<meta
			name="twitter:description"
			content="Building secure, high-performance distributed systems in Rust and C#."
		/>
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<title>András Pintér | Principal Software Engineer & Architect</title>
		<script>
			(function () {
				try {
					var saved = localStorage.getItem('theme');
					var theme =
						saved === 'dark' || saved === 'light'
							? saved
							: window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					document.documentElement.setAttribute('data-theme', theme);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
