name: Build CV
run-name: Generating and build CV
on:
  push:
    branches:
      - master
jobs:
  build-cv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xu-cheng/latex-action@v4
        with:
          root_file: cv.tex
          working_directory: cv
          pre_compile: "tlmgr update --self && tlmgr update --all"
